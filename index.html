<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOT GUESS - Fire Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; margin: 0; }
        .correct { background-color: #ff3e3e; border-color: #ff3e3e; box-shadow: 0 0 15px rgba(255,62,62,0.4); }
        .present { background-color: #ffa502; border-color: #ffa502; box-shadow: 0 0 15px rgba(255,165,2,0.3); }
        .absent { background-color: #2d2e2f; border-color: #2d2e2f; }
        .empty { border-color: #3a3a3c; }
        .key { background-color: #4b4b4b; transition: all 0.1s; }
        .key:active { transform: scale(0.95); }
        #cheat-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ff3e3e; color: white; padding: 10px 24px; border-radius: 20px; font-weight: bold; font-size: 1.2rem; z-index: 999; display: none; box-shadow: 0 0 20px rgba(255,62,62,0.6); }
        #cheat-toast.show { display: block; animation: fadeInOut 2s forwards; }
        @keyframes fadeInOut { 0% { opacity: 0; top: 40px; } 20% { opacity: 1; top: 20px; } 80% { opacity: 1; top: 20px; } 100% { opacity: 0; top: 0; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">
    <div id="cheat-toast"></div>
    <header class="w-full max-w-md border-b border-red-900/30 pb-4 mb-8 flex flex-col items-center">
        <h1 class="text-4xl font-black tracking-tighter text-white uppercase italic">🔥 HOT GUESS 🔥</h1>
    </header>
    <div id="grid" class="grid grid-rows-6 gap-2 mb-8"></div>
    <div id="keyboard" class="w-full max-w-lg mt-auto pb-4"></div>
    <script>
        const WORDS = ["BRIGHT","GUESS","REACT","STUDIO","WORLD","PLANE","BREAD","CRANE","STONE","LIGHT","SHARP","GRAPE","DREAM","FLAME","SNAKE","STORM","TOUCH","WATER","GREEN","CLOCK","HOUSE","SMART","BRAVE","CLEAR","FRESH","GRAND","HEART","MUSIC","NIGHT","PEACE","POWER","RADIO","SMILE","SOUND","SPACE","SWEET","TABLE","TIGER","TRUST","VOICE","WHITE","YOUNG"];
        const solution = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
        let guesses = [];
        let currentGuess = "";
        let gameOver = false;
        const gridEl = document.getElementById('grid');
        const keyboardEl = document.getElementById('keyboard');
        const cheatToast = document.getElementById('cheat-toast');
        function showCheat() { cheatToast.textContent = '🔥 ' + solution + ' 🔥'; cheatToast.classList.remove('show'); void cheatToast.offsetWidth; cheatToast.classList.add('show'); }
        function init() { renderGrid(); renderKeyboard(); window.addEventListener('keydown', e => { if (e.key === '?') { e.preventDefault(); showCheat(); return; } handleInput(e.key.toUpperCase()); }); }
        function handleInput(key) { if (gameOver) return; if (key === 'ENTER') { alert('You pressed ENTER. Current guess: ' + currentGuess); if (currentGuess.length !== 5) return; guesses.push(currentGuess); const win = currentGuess === solution; currentGuess = ""; if (win || guesses.length === 6) { gameOver = true; setTimeout(() => alert(win ? "YOU'RE ON FIRE!" : "BURNT OUT! The word was " + solution), 500); } } else if (key === 'BACKSPACE' || key === 'DELETE') { currentGuess = currentGuess.slice(0, -1); } else if (/^[A-Z]$/.test(key) && currentGuess.length < 5) { currentGuess += key; } renderGrid(); renderKeyboard(); }
        function renderGrid() { gridEl.innerHTML = ""; for (let i = 0; i < 6; i++) { const row = document.createElement('div'); row.className = "flex gap-2"; const guess = guesses[i] || (i === guesses.length ? currentGuess : ""); for (let j = 0; j < 5; j++) { const char = guess[j] || ""; const cell = document.createElement('div'); cell.className = "w-14 h-14 border-2 flex items-center justify-center text-3xl font-black uppercase select-none"; if (guesses[i]) { if (solution[j] === char) cell.classList.add('correct'); else if (solution.includes(char)) cell.classList.add('present'); else cell.classList.add('absent'); } else { cell.classList.add(char ? 'border-red-500' : 'empty'); } cell.textContent = char; row.appendChild(cell); } gridEl.appendChild(row); } }
        function renderKeyboard() { keyboardEl.innerHTML = ""; const rows = [["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["ENTER","Z","X","C","V","B","N","M","DELETE"]]; rows.forEach(row => { const rowEl = document.createElement('div'); rowEl.className = "flex justify-center gap-1.5 mb-2"; row.forEach(key => { const btn = document.createElement('button'); btn.className = "key flex items-center justify-center font-bold rounded p-2 text-white " + (key.length > 1 ? "px-4 text-xs w-16" : "w-10") + " h-14"; btn.textContent = key; btn.onclick = () => handleInput(key === 'DELETE' ? 'BACKSPACE' : key); rowEl.appendChild(btn); }); keyboardEl.appendChild(rowEl); }); }
        init();
    </script>
</body>
</html>
